name: Source Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  QT_QPA_PLATFORM: offscreen
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  publish-source-release:
    name: Publish Source Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime and release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-timeout

      - name: Run source release quality gates
        run: |
          python -m compileall app core extensions models processing ui main.py run.py
          python -m pytest \
            tests/test_architecture_guardrails.py \
            tests/test_backend.py \
            tests/test_phase10_guardrails.py \
            tests/test_refactor_guardrails.py \
            tests/test_settings_page_refresh.py \
            -q --timeout=120

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            This GitHub release is a source-code milestone only.

            Desktop installers are distributed separately through external channels.
