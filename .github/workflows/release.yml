name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  QT_QPA_PLATFORM: offscreen
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  build-release:
    name: Build Release Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime and release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pyinstaller

      - name: Run release quality gates
        run: |
          python -m compileall app core extensions models processing ui main.py run.py
          python -m pytest \
            tests/test_phase10_guardrails.py \
            tests/test_settings_page_refresh.py \
            -q

      - name: Build distributable archive
        run: |
          python build.py --clean --skip-tests

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: aline-release-${{ github.sha }}
          path: dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
