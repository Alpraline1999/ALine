name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QT_QPA_PLATFORM: offscreen
  MPLBACKEND: Agg
  PYTHONUTF8: "1"

jobs:
  quality:
    name: Focused Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime and quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest mypy

      - name: Compile source tree
        run: |
          python -m compileall app core extensions models processing ui main.py run.py

      - name: Run focused regression suite
        run: |
          python -m pytest \
            tests/test_phase10_guardrails.py \
            tests/test_settings_page_refresh.py \
            -q

  typecheck-report:
    name: Mypy Baseline Report
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime and typecheck dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install mypy

      - name: Run mypy
        run: |
          python -m mypy .
